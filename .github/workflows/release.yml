name: Release kit tarball

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies (tsx, express)
        run: npm install --omit=dev --ignore-scripts --no-audit --no-fund

      - name: Install wxkanban-agent dependencies
        working-directory: wxkanban-agent
        run: npm install --omit=dev --ignore-scripts --no-audit --no-fund

      - name: Install mcp-server dependencies
        working-directory: mcp-server
        run: npm install --no-audit --no-fund

      - name: Build mcp-server
        working-directory: mcp-server
        run: npm run build

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Assemble kit staging directory
        # Does NOT include per-project files (.wxkanban-project.json, ai-settings.json,
        # .env) — wxKanban's kitRoutes injects those server-side at download time
        # per spec 019 Decision #13.
        run: |
          mkdir -p dist staging
          cp -r \
            bin \
            wxkanban-agent \
            mcp-server \
            _wxAI \
            scripts \
            .vscode \
            CLAUDE.md \
            AI.md \
            ProjectOverview.md \
            package.json \
            package-lock.json \
            node_modules \
            README.md \
            staging/
          # Scrub any dev-only/noise artifacts that may have slipped in
          find staging -type d -name '.history' -prune -exec rm -rf {} +
          find staging -type d -name 'node_modules/.cache' -prune -exec rm -rf {} +

      - name: Build kit.tar.gz (Unix/Mac)
        working-directory: staging
        run: tar -czf ../dist/kit.tar.gz .

      - name: Build kit.zip (Windows)
        working-directory: staging
        run: zip -rq ../dist/kit.zip .

      - name: Compute checksums
        working-directory: dist
        run: |
          sha256sum kit.tar.gz > kit.tar.gz.sha256
          sha256sum kit.zip    > kit.zip.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: wxKanban Orchestrator Kit ${{ steps.ver.outputs.version }}
          body: |
            ## wxKanban Orchestrator Kit ${{ steps.ver.outputs.version }}

            Auto-built from tag `${{ steps.ver.outputs.version }}`.

            **Artifacts:**
            - `kit.tar.gz` — full kit bundle for Unix/Mac (runtime dependencies included)
            - `kit.zip` — full kit bundle for Windows (same contents, zip format)
            - `kit.tar.gz.sha256` / `kit.zip.sha256` — SHA-256 checksums

            **Consumption:**
            wxKanban's `/api/kit/download` endpoint fetches the appropriate archive based on the client platform (or user preference), injects per-project credentials server-side, and streams to the user. Direct download of either artifact is also supported for manual installs.

            See `CLAUDE.md` in the archive for orientation.
          files: |
            dist/kit.tar.gz
            dist/kit.tar.gz.sha256
            dist/kit.zip
            dist/kit.zip.sha256
